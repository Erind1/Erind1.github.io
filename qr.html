<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYSI Menu QR Code</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a2a4a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Lato', sans-serif;
    padding: 2rem;
  }
  .card {
    background: #fdf6ec;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    max-width: 340px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 {
    font-family: 'Playfair Display', serif;
    color: #1a2a4a;
    font-size: 1.5rem;
    line-height: 1.2;
  }
  h1 span { color: #c0392b; }
  p.sub {
    color: #888;
    font-size: 0.78rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0.4rem 0 1.5rem;
  }
  #qr-container {
    background: #fff;
    display: inline-block;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 1.2rem;
    border: 2px solid #eee;
  }
  .instructions {
    font-size: 0.85rem;
    color: #555;
    line-height: 1.6;
    margin-bottom: 1.2rem;
  }
  .instructions strong { color: #1a2a4a; }
  .divider {
    border: none;
    border-top: 1px dashed #ddd;
    margin: 1.2rem 0;
  }
  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: #c9a84c;
    font-size: 0.95rem;
  }
  .wifi-info {
    background: #1a2a4a;
    color: #fff;
    border-radius: 8px;
    padding: 0.8rem 1rem;
    margin-top: 1rem;
    font-size: 0.82rem;
    text-align: left;
  }
  .wifi-info .row { display: flex; justify-content: space-between; padding: 3px 0; }
  .wifi-info .label { color: rgba(255,255,255,0.55); }
  .wifi-info .val { font-weight: 700; color: #c9a84c; }
  .open-btn {
    display: block;
    margin-top: 1rem;
    background: #c0392b;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.75rem;
    width: 100%;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.5px;
  }
  .note {
    font-size: 0.75rem;
    color: #aaa;
    margin-top: 0.75rem;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Restorant Piceri <span>"HYSI"</span></h1>
  <p class="sub">— Scan to view menu —</p>

  <div id="qr-container">
    <canvas id="qrCanvas"></canvas>
  </div>

  <div class="instructions">
    Point your <strong>phone camera</strong> at the QR code to open our full bilingual menu 🇦🇱 🇬🇧
  </div>

  <hr class="divider">

  <div class="wifi-info">
    <div style="font-size:0.75rem;color:rgba(255,255,255,0.4);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;">📶 Free WiFi</div>
    <div class="row"><span class="label">Network</span><span class="val">Restorant Hysi 5G</span></div>
    <div class="row"><span class="label">Password</span><span class="val">12345678</span></div>
  </div>

  <a class="open-btn" href="https://erind1.github.io/hysi-menu/" target="_blank">📖 Open Menu</a>
  <p class="note">Or scan the QR code with your phone camera</p>

  <hr class="divider">
  <div class="tagline">Ju Faleminderit · Thank You</div>
</div>

<script>
  const menuUrl = 'https://erind1.github.io/hysi-menu/';

  QRCode.toCanvas(document.getElementById('qrCanvas'), menuUrl, {
    width: 220,
    margin: 1,
    color: { dark: '#1a2a4a', light: '#ffffff' }
  });
</script>
</body>
</html>

  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

    color: #222;
    min-height: 100vh;
  }

  /* HEADER */
  header {

    padding: 2.5rem 1rem 2rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';

  }
  header h1 {
    font-family: 'Playfair Display', serif;
    color: #fff;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    letter-spacing: 1px;
    line-height: 1.2;
  }
  header h1 span {
    color: var(--gold);
  }
  header p {
    color: rgba(255,255,255,0.55);
    font-size: 0.82rem;
    margin-top: 0.4rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .tagline {
    color: var(--gold);
    font-style: italic;
    font-size: 0.9rem;
    margin-top: 0.8rem;
    font-family: 'Playfair Display', serif;
  }

  /* LANG TOGGLE */
  .lang-bar {
    background: var(--red);
    display: flex;
    justify-content: center;
    gap: 0;
  }
  .lang-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    padding: 0.6rem 2rem;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    border-bottom: 3px solid transparent;
  }
  .lang-btn.active {
    color: #fff;
    border-bottom-color: var(--gold);
  }

  /* NAV TABS */
  .nav-tabs {
    background: var(--navy);
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    gap: 0;
    padding: 0 0.5rem;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    background: none;
    border: none;
    color: rgba(255,255,255,0.55);
    padding: 0.8rem 1rem;
    font-family: 'Lato', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .nav-tab.active, .nav-tab:hover {
    color: #fff;
    border-bottom-color: var(--gold);
  }

  /* CONTENT */
  main { padding: 1.5rem 1rem 4rem; max-width: 680px; margin: 0 auto; }

  .section { display: none; }
  .section.active { display: block; }

  /* CATEGORY */
  .category { margin-bottom: 2rem; }
  .cat-header {
    background: var(--red);
    color: #fff;
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    margin-bottom: 0.75rem;
    letter-spacing: 0.5px;
  }
  .cat-header.navy { background: var(--navy); }

  /* ITEMS */
  .item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.45rem 0.25rem;
    border-bottom: 1px dotted #ddd;
    gap: 0.5rem;
  }
  .item:last-child { border-bottom: none; }
  .item-name {
    font-size: 0.88rem;
    color: #333;
    flex: 1;
    line-height: 1.3;
  }
  .item-price {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--red);
    white-space: nowrap;
    min-width: 54px;
    text-align: right;
  }

  /* TWO COL on wider screens */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1.5rem; }
  @media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } }

  /* FOOTER */
  footer {
    text-align: center;
    background: var(--navy);
    color: rgba(255,255,255,0.5);
    padding: 1.5rem;
    font-size: 0.8rem;
    font-style: italic;
  }
  footer strong { color: var(--gold); font-style: normal; }
</style>

let currentLang = 'al';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  buildNav();
  buildSections();
  setTab(data[lang][0].id);
}

function buildNav() {
  const nav = document.getElementById('navTabs');
  nav.innerHTML = '';
  data[currentLang].forEach(sec => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab';
    btn.textContent = sec.label;
    btn.dataset.id = sec.id;
    btn.onclick = () => setTab(sec.id);
    nav.appendChild(btn);
  });
}

function buildSections() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  data[currentLang].forEach(sec => {
    const div = document.createElement('div');
    div.className = 'section';
    div.id = 'sec-' + sec.id;
    sec.categories.forEach(cat => {
      const catDiv = document.createElement('div');
      catDiv.className = 'category';
      catDiv.innerHTML = `<div class="cat-header${cat.navy ? ' navy' : ''}">${cat.title}</div>`;
      cat.items.forEach(([name, price]) => {
        catDiv.innerHTML += `<div class="item"><span class="item-name">${name}</span><span class="item-price">${price}</span></div>`;
      });
      div.appendChild(catDiv);
    });
    main.appendChild(div);
  });
}

function setTab(id) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + id));
}

buildSections();
